version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: paystream-postgres
    environment:
      POSTGRES_DB: paystream
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: paystream-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: paystream-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/paystream
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET}
      CASHFREE_CLIENT_ID: ${CASHFREE_CLIENT_ID}
      CASHFREE_CLIENT_SECRET: ${CASHFREE_CLIENT_SECRET}
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: paystream-frontend
    ports:
      - "4200:80"
    depends_on:
      - app

volumes:
  postgres-data: